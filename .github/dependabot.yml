version: 2
updates:
  # GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  # sw-ai (Python)
  - package-ecosystem: pip
    directory: /sw-ai
    schedule:
      interval: weekly
    groups:
      sw-ai-python:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /sw-ai
    schedule:
      interval: weekly
    groups:
      sw-ai-docker:
        patterns:
          - "*"

  # sw-bot (Python)
  - package-ecosystem: pip
    directory: /sw-bot
    schedule:
      interval: weekly
    groups:
      sw-bot-python:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /sw-bot
    schedule:
      interval: weekly
    groups:
      sw-bot-docker:
        patterns:
          - "*"

  # sw-dash (Next.js, Bun)
  - package-ecosystem: npm
    directory: /sw-dash
    schedule:
      interval: weekly
    groups:
      sw-dash-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
      sw-dash-dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /sw-dash
    schedule:
      interval: weekly
    groups:
      sw-dash-docker:
        patterns:
          - "*"

  # sw-list (Next.js, pnpm)
  - package-ecosystem: npm
    directory: /sw-list
    schedule:
      interval: weekly
    groups:
      sw-list-prod:
        dependency-type: production
        update-types:
          - minor
          - patch
      sw-list-dev:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /sw-list
    schedule:
      interval: weekly
    groups:
      sw-list-docker:
        patterns:
          - "*"
